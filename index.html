<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الرزنامة المزدوجة</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    overflow:hidden;
    color:white;

    background:
    linear-gradient(rgba(0,0,0,0.55),
    rgba(0,0,0,0.75)),

    url("https://images.unsplash.com/photo-1532693322450-2cb5c511067d?q=80&w=1920");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

#canvas{
    width:100vw;
    height:70vh;
    display:block;

    background:rgba(0,0,0,0.2);

    backdrop-filter:blur(3px);
}

header{
    width:100%;
    padding:20px;

    position:absolute;
    top:0;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(0,0,0,0.25);

    backdrop-filter:blur(10px);
}

.logo{
    font-size:28px;
    font-weight:bold;

    color:#ffd54f;
}

.menu{
    display:flex;
    gap:15px;
}

.menu button{
    padding:10px 18px;

    border:none;
    border-radius:12px;

    background:rgba(255,255,255,0.08);

    color:white;

    cursor:pointer;

    transition:0.3s;
}

.menu button:hover{
    background:rgba(255,255,255,0.18);

    transform:translateY(-2px);
}

#panel{

    position:absolute;

    bottom:20px;

    width:100%;

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;
}

.card{

    min-width:220px;

    padding:20px;

    border-radius:18px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.15);

    backdrop-filter:blur(10px);

    text-align:center;

    transition:0.3s;

    box-shadow:
    0 0 20px rgba(0,0,0,0.35);
}

.card:hover{

    transform:translateY(-5px)
    scale(1.03);

    background:rgba(255,255,255,0.12);
}

.card i{

    font-size:30px;

    margin-bottom:10px;

    display:block;
}

.fa-sun{
    color:orange;
}

.fa-moon{
    color:#9ecbff;
}

.fa-calendar-days{
    color:white;
}

.title{
    font-size:18px;
    margin-bottom:10px;
}

.value{
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<header>

<div class="logo">
☀ الرزنامة المزدوجة 🌙
</div>

<div class="menu">

<button>الرئيسية</button>

<button>البحث</button>

<button>الخط الزمني</button>

<button>حول النظام</button>

</div>

</header>

<canvas id="canvas"></canvas>

<div id="panel">

<div class="card">

<i class="fa-solid fa-sun"></i>

<div class="title">التاريخ الشمسي</div>

<div class="value" id="solarText">
1/1/1
</div>

</div>

<div class="card">

<i class="fa-solid fa-moon"></i>

<div class="title">التاريخ القمري</div>

<div class="value" id="lunarText">
1/1/1
</div>

</div>

<div class="card">

<i class="fa-solid fa-calendar-days"></i>

<div class="title">اسم اليوم</div>

<div class="value" id="weekText">
Sunday
</div>

</div>

</div>

<script src="engine.js"></script>
<script src="timeline.js"></script>

</body>
</html>
