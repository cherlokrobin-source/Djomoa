<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرزنامة المزدوجة</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* إعدادات عامة وتصفير الهوامش */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            overflow: hidden;
            color: white;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)),
                        url("https://images.unsplash.com/photo-1532693322450-2cb5c511067d?q=80&w=1920");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* شريط التنقل العلوي */
        header {
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #ffd54f;
            text-shadow: 0 0 10px rgba(255, 213, 79, 0.3);
        }

        .menu {
            display: flex;
            gap: 12px;
        }

        .menu button {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu button:hover, .menu button.active-btn {
            background: #ffd54f;
            color: #111;
            border-color: #ffd54f;
            box-shadow: 0 4px 15px rgba(255, 213, 79, 0.2);
            transform: translateY(-2px);
        }

        /* منطقة محتوى الصفحات والكانفاس */
        .main-container {
            position: relative;
            flex: 1;
            width: 100%;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* للسماح بالضغط على العناصر تحته */
        }

        /* نظام الصفحات */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* مخفية افتراضياً */
            justify-content: center;
            align-items: center;
